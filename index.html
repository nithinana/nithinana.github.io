<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>nithinana / projects</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: {
                extend: {
                    borderRadius: { 'xl': '1rem', '2xl': '1.5rem' }
                }
            }
        }
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.remove('dark');
        } else {
            document.documentElement.classList.add('dark');
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500&family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root {
            --bg: #fafafa; --text: #18181b; --border: #e4e4e7; --accent: #71717a;
            --grid-color: rgba(24, 24, 27, 0.04);
            --logo-url: url('https://thirai.uk/static/thiraiblack.png');
        }

        .dark {
            --bg: #18181b; --text: #f4f4f5; --border: #27272a; --accent: #a1a1aa;
            --grid-color: rgba(255, 255, 255, 0.02);
            --logo-url: url('https://thirai.uk/static/thiraiwhite.png');
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: var(--text);
            margin: 0;
            overflow-x: hidden;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        #grid-bg {
            position: fixed;
            top: -10%; left: -10%; width: 120%; height: 120%;
            background-image: radial-gradient(var(--grid-color) 1px, transparent 1px);
            background-size: 32px 32px;
            z-index: -1;
        }

        .repo-card, .nav-btn {
            border: 1px solid var(--border);
            background-color: var(--bg);
            border-radius: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Bolder 2px border by default (unhighlighted) */
        .pinned-card {
            border: 2px solid var(--border);
            background-color: var(--bg);
            border-radius: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-btn {
            padding: 10px;
            font-size: 13px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        @media (min-width: 768px) {
            .nav-btn { padding: 8px 16px; }
        }

        .nav-btn:hover {
            border-color: var(--accent);
            background-color: rgba(161, 161, 170, 0.1);
            transform: translateY(-1px);
        }

        .repo-card { opacity: 0; transform: translateY(10px); transition: all 0.3s ease; }
        .repo-card.visible { opacity: 1; transform: translateY(0); }

        .repo-card:hover {
            border-color: var(--accent);
            background-color: rgba(161, 161, 170, 0.05);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .pinned-card:hover {
            border-color: var(--accent); 
            background-color: rgba(161, 161, 170, 0.05);
            box-shadow: 0 15px 20px -5px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        .thirai-logo {
            background-image: var(--logo-url);
            background-size: contain; background-repeat: no-repeat; background-position: center;
            height: 32px; width: 120px;
        }
    </style>
</head>
<body class="antialiased">

    <div id="grid-bg"></div>

<header class="max-w-5xl mx-auto px-6 pt-16 md:pt-24 pb-12 flex flex-col md:flex-row md:items-center justify-between gap-8">
    <div class="flex flex-col items-center md:items-start text-center md:text-left">
        <h1 class="text-3xl md:text-4xl font-bold tracking-tight">nithinana</h1>
    </div>

    <div class="flex items-center justify-center gap-2 md:gap-3">
        <a href="https://github.com/nithinana" target="_blank" class="nav-btn" title="GitHub">
            <i data-lucide="github" class="w-4 h-4"></i>
            <span class="hidden md:inline">github</span>
        </a>
        <a href="https://www.snapchat.com/add/nithinan_a" target="_blank" class="nav-btn" title="Snapchat">
            <i data-lucide="ghost" class="w-4 h-4"></i>
            <span class="hidden md:inline">snap</span>
        </a>
        <a href="mailto:nithinana2009@gmail.com" class="nav-btn" title="Email">
            <i data-lucide="mail" class="w-4 h-4"></i>
            <span class="hidden md:inline">mail</span>
        </a>
        <button onclick="toggleTheme()" class="nav-btn bg-zinc-900 text-white dark:bg-white dark:text-zinc-900 border-none shadow-lg">
            <i data-lucide="sun" class="hidden dark:block w-4 h-4"></i>
            <i data-lucide="moon" class="block dark:hidden w-4 h-4"></i>
        </button>
    </div>
</header>

    <section class="max-w-5xl mx-auto px-6 mb-12">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
            <a href="/frontendthirai" class="pinned-card p-10 md:p-12 block flex items-center justify-center min-h-[140px] group transition-all">
                <div class="thirai-logo group-hover:scale-105 transition-all duration-500"></div>
            </a>
            <a href="/free" class="pinned-card p-10 md:p-12 block flex items-center justify-center min-h-[140px] group text-center">
                <h2 class="text-lg font-semibold tracking-tight">free periods</h2>
            </a>
            <a href="/mathspec" class="pinned-card p-10 md:p-12 block flex items-center justify-center min-h-[140px] group text-center">
                <h2 class="text-lg font-semibold tracking-tight">mathspec</h2>
            </a>
        </div>
    </section>

    <main class="max-w-5xl mx-auto px-6 pb-24">
        <div class="flex items-center gap-4 mb-10">
            <h2 class="text-xs font-bold font-mono tracking-widest opacity-40">/root/repo</h2>
            <span class="h-[1px] flex-grow bg-zinc-200 dark:bg-zinc-800"></span>
        </div>
        <div id="repo-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6">
            <div class="p-4 text-zinc-500 text-sm animate-pulse">fetching projects...</div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        const grid = document.getElementById('grid-bg');
        if (window.matchMedia("(pointer: fine)").matches) {
            document.addEventListener('mousemove', (e) => {
                const x = (window.innerWidth / 2 - e.pageX) / 100;
                const y = (window.innerHeight / 2 - e.pageY) / 100;
                grid.style.transform = `translateX(${x}px) translateY(${y}px)`;
            });
        }

        const username = 'nithinana';
        const repoGrid = document.getElementById('repo-grid');

        async function fetchRepos() {
            try {
                const res = await fetch(`https://api.github.com/users/${username}/repos?sort=updated&per_page=12`);
                const data = await res.json();
                repoGrid.innerHTML = '';

                data.filter(r => !r.fork).forEach((repo, i) => {
                    const card = document.createElement('a');
                    card.href = repo.html_url;
                    card.target = "_blank";
                    card.className = "repo-card p-6 md:p-8 block group";
                    card.innerHTML = `
                        <div class="flex flex-col h-full">
                            <div class="flex justify-between items-start mb-4">
                                <h2 class="text-base font-bold group-hover:text-emerald-500 transition-colors line-clamp-1">${repo.name.toLowerCase()}</h2>
                                <span class="text-[9px] px-2 py-0.5 rounded-full bg-zinc-100 dark:bg-zinc-800 font-bold tracking-widest flex-shrink-0">${(repo.language || 'project').toLowerCase()}</span>
                            </div>
                            <p class="text-zinc-500 dark:text-zinc-400 text-sm leading-relaxed mb-6 flex-grow line-clamp-2">
                                ${(repo.description || 'no description available.').toLowerCase()}
                            </p>
                            <div class="flex items-center justify-between pt-4 border-t border-zinc-100 dark:border-zinc-800">
                                <span class="text-[10px] font-medium opacity-40">${new Date(repo.pushed_at).toLocaleDateString(undefined, { year: 'numeric', month: 'short' }).toLowerCase()}</span>
                                <div class="flex items-center gap-3">
                                    <span class="text-[10px] font-medium flex items-center gap-1 opacity-70">
                                        <i data-lucide="star" class="w-3 h-3 text-amber-500 fill-amber-500"></i> ${repo.stargazers_count}
                                    </span>
                                </div>
                            </div>
                        </div>
                    `;
                    repoGrid.appendChild(card);
                    lucide.createIcons();
                    setTimeout(() => card.classList.add('visible'), i * 60);
                });
            } catch (e) {
                repoGrid.innerHTML = `<div class="p-4 text-zinc-500 font-medium">unable to load repositories.</div>`;
            }
        }
        fetchRepos();
    </script>
</body>
</html>
