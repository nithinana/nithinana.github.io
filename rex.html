<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nithinana / projects</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.remove('dark');
        } else {
            document.documentElement.classList.add('dark');
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500&family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root {
            --bg: #ffffff;
            --text: #000000;
            --border: #eeeeee;
            --accent: #737373;
            --grid-color: rgba(0, 0, 0, 0.05);
            --logo-url: url('https://thirai.me/static/thiraiblack.png');
        }

        .dark {
            --bg: #0a0a0a;
            --text: #ededed;
            --border: #1f1f1f;
            --accent: #888888;
            --grid-color: rgba(255, 255, 255, 0.05);
            --logo-url: url('https://thirai.me/static/thiraiwhite.png');
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: var(--text);
            margin: 0;
            overflow-x: hidden;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        #grid-bg {
            position: fixed;
            top: -10%; left: -10%; width: 120%; height: 120%;
            background-image: radial-gradient(var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            transition: transform 0.1s ease-out;
        }

        .mono { font-family: 'Geist Mono', monospace; }

        .repo-card, .pinned-card, .nav-btn {
            border: 1px solid var(--border);
            background-color: var(--bg);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-btn {
            padding: 6px 12px;
            font-size: 10px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .nav-btn:hover {
            border-color: var(--accent);
            background-color: rgba(125, 125, 125, 0.05);
        }

        .repo-card { opacity: 0; transform: translateY(10px); }
        .repo-card.visible { opacity: 1; transform: translateY(0); }

        .repo-card:hover, .pinned-card:hover {
            border-color: var(--accent);
            background-color: rgba(125, 125, 125, 0.03);
        }

        .accent-text { color: var(--accent); }
        .thirai-logo {
            background-image: var(--logo-url);
            background-size: contain; background-repeat: no-repeat; background-position: center;
            height: 30px; width: 110px;
        }

        .status-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
    </style>
</head>
<body class="antialiased">

    <div id="grid-bg"></div>

    <header class="max-w-5xl mx-auto px-8 pt-20 pb-16 flex flex-col md:flex-row md:items-start justify-between gap-6">
        <div class="flex flex-col">
            <h1 class="text-xl font-medium tracking-tight mono">nithinana / projects</h1>
            <div class="flex items-center gap-2 mt-1">
                <span class="h-1.5 w-1.5 rounded-full bg-green-500 status-pulse"></span>
                <p class="accent-text text-[10px] mono uppercase tracking-widest">System_Active</p>
            </div>
        </div>

        <div class="flex items-center gap-2 mono">
            <a href="https://github.com/nithinana" target="_blank" class="nav-btn" title="GitHub">
                <i data-lucide="github" class="w-3.5 h-3.5"></i>
                <span>Github</span>
            </a>
            <a href="mailto:nithinana2009@gmail.com" class="nav-btn" title="Email">
                <i data-lucide="mail" class="w-3.5 h-3.5"></i>
                <span>Email</span>
            </a>
            <a href="https://snapchat.com/add/nithinan_a" target="_blank" class="nav-btn" title="Snapchat">
                <i data-lucide="ghost" class="w-3.5 h-3.5"></i>
                <span>Snapchat</span>
            </a>
            <button onclick="toggleTheme()" class="nav-btn bg-black text-white dark:bg-white dark:text-black border-none">
                <i data-lucide="sun" class="hidden dark:block w-3.5 h-3.5"></i>
                <i data-lucide="moon" class="block dark:hidden w-3.5 h-3.5"></i>
            </button>
        </div>
    </header>

    <section class="max-w-5xl mx-auto px-8 mb-12">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <a href="/frontendthirai" class="pinned-card p-10 block flex items-center justify-center min-h-[140px] group transition-all">
                <div class="thirai-logo group-hover:scale-105 transition-all duration-500"></div>
            </a>
            <a href="/free" class="pinned-card p-10 block flex items-center justify-center min-h-[140px] group text-center">
                <h2 class="text-lg font-bold tracking-tight">free periods</h2>
            </a>
        </div>
    </section>

    <main class="max-w-5xl mx-auto px-8 pb-32">
        <div class="flex items-center gap-3 mb-8">
            <p class="text-[10px] mono uppercase tracking-widest accent-text">usr/bin/repos</p>
            <span class="h-[1px] flex-grow border-t border-[var(--border)]"></span>
        </div>
        <div id="repo-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <div class="p-4 accent-text text-xs mono">Syncing_Remote...</div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        const grid = document.getElementById('grid-bg');
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 60;
            const y = (window.innerHeight / 2 - e.pageY) / 60;
            grid.style.transform = `translateX(${x}px) translateY(${y}px)`;
        });

        const username = 'nithinana';
        const repoGrid = document.getElementById('repo-grid');

        async function fetchRepos() {
            try {
                const res = await fetch(`https://api.github.com/users/${username}/repos?sort=updated&per_page=12`);
                const data = await res.json();
                repoGrid.innerHTML = '';

                data.filter(r => !r.fork).forEach((repo, i) => {
                    const card = document.createElement('a');
                    card.href = repo.html_url;
                    card.target = "_blank";
                    card.className = "repo-card p-6 block group";
                    card.innerHTML = `
                        <div class="flex flex-col h-full">
                            <div class="flex justify-between items-start mb-6">
                                <h2 class="text-[13px] font-medium mono transition-colors">${repo.name}</h2>
                                <span class="text-[9px] px-1.5 py-0.5 border border-[var(--border)] accent-text mono uppercase">${repo.language || 'src'}</span>
                            </div>
                            <p class="accent-text text-[12px] leading-relaxed mb-8 flex-grow opacity-80 font-light">
                                ${repo.description || '// Metadata missing.'}
                            </p>
                            <div class="flex items-center justify-between opacity-30 group-hover:opacity-100 transition-opacity">
                                <span class="text-[9px] mono tracking-tighter italic">${repo.pushed_at.split('T')[0]}</span>
                                <span class="text-[10px] mono">★ ${repo.stargazers_count}</span>
                            </div>
                        </div>
                    `;
                    repoGrid.appendChild(card);
                    setTimeout(() => card.classList.add('visible'), i * 50);
                });
            } catch (e) {
                repoGrid.innerHTML = `<div class="p-4 text-red-500 mono text-xs">ERR: FETCH_FAILED</div>`;
            }
        }
        fetchRepos();
    </script>
</body>
</html>
